<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalistické Počítadlo</title>
    <style>
        /* Čistý černobílý design */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Bílé pozadí */
            color: #000000; /* Černý text */
            font-family: 'Courier New', Courier, monospace; /* Monospace font pro technický vzhled */
        }

        .container {
            text-align: center;
            border: 4px solid #000; /* Silné černé ohraničení */
            padding: 50px;
            background: white;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #counter {
            font-size: 10rem;
            font-weight: 900;
            margin: 20px 0;
            line-height: 1;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            background: #000;
            color: #fff;
            border: 2px solid #000;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Inverzní efekt při hoveru */
        button:hover {
            background: #fff;
            color: #000;
        }

        button:active {
            transform: scale(0.9);
        }

        .btn-reset {
            margin-top: 30px;
            background: none;
            color: #000;
            text-decoration: underline;
            border: none;
            font-size: 1rem;
            padding: 5px;
        }

        .btn-reset:hover {
            background: #000;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Counter</h1>
        <div id="counter">0</div>
        
        <div class="buttons">
            <button onclick="update(-1)">-</button>
            <button onclick="update(1)">+</button>
        </div>

        <button class="btn-reset" onclick="reset()">RESET</button>
    </div>

    <script>
        let count = 0;
        const display = document.getElementById('counter');

        function update(val) {
            count += val;
            display.innerText = count;
        }

        function reset() {
            count = 0;
            display.innerText = count;
        }
    </script>

</body>
</html>
